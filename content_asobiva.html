<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#e0e0e0; --white:#ffffff; --ink:#1a1a1a; --ink-soft:#888; --border:#e0e0e0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }
.wrap { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; }
.site-header { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:var(--white); border-bottom:1px solid var(--border); position:sticky; top:0; }
.back-link { font-size:12px; font-weight:500; letter-spacing:0.04em; color:var(--ink-soft); text-decoration:none; }
.header-pair { display:flex; flex-direction:column; background:var(--white); }
.banner-slot { width:100%; min-height:80px; background:var(--white); display:flex; align-items:center; justify-content:center; }
.banner-slot img { width:100%; height:auto; display:block; }
.slot-label { font-size:10px; letter-spacing:0.12em; color:#ccc; }
.card-section { background: var(--bg); padding-top:10px; }
.card-section.no-gap { background: var(--white); padding-top:0; }
.card-section.line-gap { background: var(--white); padding-top:0; border-top:1px solid var(--ink); }
.card { width:100%; display:block; text-decoration:none; background:var(--white); overflow:hidden; }
.card img { width:100%; height:auto; display:block; }
.html-card { width:100%; position:relative; background:var(--white); overflow:hidden; }
.html-card iframe { display:block; width:100%; height:480px; border:none; background:var(--white); }
.carousel-card { width:100%; position:relative; background:var(--white); overflow:hidden; cursor:pointer; }
.carousel-card img { width:100%; height:auto; display:block; }
.carousel-dots { position:absolute; bottom:10px; left:0; right:0; display:flex; justify-content:center; gap:6px; pointer-events:none; }
.carousel-dots span { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.55); }
.carousel-dots span.active { background:#fff; transform:scale(1.25); }
.carousel-count { position:absolute; top:10px; right:10px; font-size:10px; letter-spacing:0.05em; color:#fff; background:rgba(0,0,0,0.45); padding:3px 8px; border-radius:20px; pointer-events:none; }
.empty-section { background: var(--bg); padding-top:10px; }
.empty-state { padding:60px 24px; text-align:center; color:var(--ink-soft); font-size:13px; line-height:2; background:var(--white); }
.empty-state strong { display:block; font-size:14px; font-weight:600; color:var(--ink); margin-bottom:6px; }
.footer-section { background: var(--bg); padding-top:10px; }
.footer-section.no-gap { padding-top:0; }
.site-header { display:flex; align-items:center; justify-content:flex-end; padding:10px 16px; background:var(--white); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; }
.burger-btn { background:none; border:none; cursor:pointer; padding:4px; display:flex; flex-direction:column; gap:5px; align-items:flex-end; }
.burger-btn span { display:block; height:1.5px; background:var(--ink); border-radius:1px; }
.burger-btn span:nth-child(1) { width:20px; }
.burger-btn span:nth-child(2) { width:14px; }
.burger-btn span:nth-child(3) { width:20px; }
.burger-menu { display:none; position:absolute; top:100%; right:12px; background:var(--white); border:1px solid var(--border); border-radius:10px; box-shadow:0 4px 16px rgba(0,0,0,0.1); overflow:hidden; z-index:200; min-width:140px; }
.burger-menu.open { display:block; }
.nav-link-item { display:block; width:100%; padding:14px 20px; background:none; border:none; border-bottom:1px solid var(--border); font-size:13px; font-weight:500; color:var(--ink); cursor:pointer; text-align:left; text-decoration:none; }
.nav-link-item:last-child { border-bottom:none; }
footer { padding:28px 16px; text-align:center; font-size:10px; letter-spacing:0.1em; color:var(--ink-soft); background:var(--white); }
</style>

<script>
window.addEventListener('message', function(e){
  if (e.data && e.data.type === 'asobiva-resize') {
    document.querySelectorAll('.html-card iframe').forEach(function(f){
      if (f.contentWindow === e.source) f.style.height = Math.max(60, e.data.height) + 'px';
    });
  }
});
function cyclerCarousel(el){
  var images = JSON.parse(el.dataset.images);
  var idx = (parseInt(el.dataset.index, 10) + 1) % images.length;
  el.dataset.index = String(idx);
  el.querySelector('img').src = images[idx];
  var dots = el.querySelectorAll('.carousel-dots span');
  dots.forEach(function(d, i){ d.classList.toggle('active', i === idx); });
  var count = el.querySelector('.carousel-count');
  if (count) count.textContent = (idx + 1) + ' / ' + images.length;
}
</script>
<script>
document.addEventListener('click', function(e){
  var menu = document.getElementById('burgerMenuStatic');
  var btn = document.getElementById('burgerBtnStatic');
  if (menu && !menu.contains(e.target) && !btn.contains(e.target)) menu.classList.remove('open');
});
</script>
